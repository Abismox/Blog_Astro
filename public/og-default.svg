<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f19"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0b0f19"/>
    </linearGradient>
    <linearGradient id="text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#bf00ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Cyber grid -->
  <g stroke="#00f5ff" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
  </g>

  <!-- Glow blobs -->
  <circle cx="900" cy="150" r="200" fill="#00f5ff" fill-opacity="0.08"/>
  <circle cx="200" cy="500" r="250" fill="#bf00ff" fill-opacity="0.08"/>

  <!-- Decorative code brackets -->
  <text x="60" y="120" font-family="JetBrains Mono, monospace" font-size="60" fill="#00f5ff" fill-opacity="0.2">&lt;/&gt;</text>

  <!-- Title -->
  <text x="600" y="290" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="100" fill="white">MI DEV</text>
  <text x="600" y="400" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="120" fill="url(#text)">BLOG</text>

  <!-- Subtitle -->
  <text x="600" y="470" text-anchor="middle" font-family="sans-serif" font-size="28" fill="#94a3b8">Tecnología, Videojuegos y Desarrollo</text>

  <!-- Border accent -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#00f5ff" stroke-opacity="0.2" stroke-width="2" rx="16"/>
</svg>
